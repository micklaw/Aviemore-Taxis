name: Deploy to Azure Static Web Apps

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  infra:
    runs-on: ubuntu-latest
    environment: production
    name: Deploy infrastructure
    outputs:
      swa_name: ${{ steps.deploy.outputs.swa_name }}
      swa_api_token: ${{ steps.token.outputs.swa_api_token }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        run: |
          outputs=$(az deployment sub create \
            --name aviemore-taxis-infra \
            --location westeurope \
            --template-file infra/main.bicep \
            --query properties.outputs \
            --output json)
          echo "swa_name=$(echo "$outputs" | jq -r '.staticWebAppName.value')" >> "$GITHUB_OUTPUT"

      - name: Get SWA deployment token
        id: token
        run: |
          token=$(az staticwebapp secrets list \
            --name "${{ steps.deploy.outputs.swa_name }}" \
            --resource-group rg-aviemore-taxis \
            --query "properties.apiKey" \
            --output tsv)
          echo "swa_api_token=$token" >> "$GITHUB_OUTPUT"

  build_and_deploy:
    needs: [infra]
    runs-on: ubuntu-latest
    environment: production
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.swa_api_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ''
          skip_app_build: true
          skip_api_build: true
